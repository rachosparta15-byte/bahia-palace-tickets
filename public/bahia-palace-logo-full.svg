<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220" role="img" aria-label="Bahia Palace Marrakech">
  <title>Bahia Palace Marrakech</title>
  <!-- emblem -->
  <g transform="translate(180,70)">
    <g fill="none" stroke="#C9A24B" stroke-width="4">
      <rect x="-50" y="-50" width="100" height="100"/>
      <rect x="-50" y="-50" width="100" height="100" transform="rotate(45)"/>
    </g>
    <g fill="none" stroke="#1F5C3D" stroke-width="4">
      <rect x="-38" y="-38" width="76" height="76"/>
      <rect x="-38" y="-38" width="76" height="76" transform="rotate(45)"/>
    </g>
    <g fill="#C9A24B">
      <rect x="-6" y="-70" width="11" height="11" transform="rotate(45 0 -65)"/>
      <rect x="-6" y="59" width="11" height="11" transform="rotate(45 0 65)"/>
      <rect x="-70" y="-6" width="11" height="11" transform="rotate(45 -65 0)"/>
      <rect x="59" y="-6" width="11" height="11" transform="rotate(45 65 0)"/>
    </g>
    <circle cx="0" cy="0" r="32" fill="#FAF6EC"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="#C9A24B" stroke-width="1.8"/>
    <text x="0" y="18" text-anchor="middle" fill="#1F5C3D" font-family="Georgia, 'Times New Roman', serif" font-size="50" font-weight="bold">B</text>
  </g>
  <!-- wordmark -->
  <text x="180" y="162" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" letter-spacing="3">
    <tspan fill="#FAF6EC">BAHIA </tspan><tspan fill="#1F5C3D" font-weight="bold">PALACE</tspan>
  </text>
  <!-- divider lines + MARRAKECH -->
  <line x1="92" y1="185" x2="128" y2="185" stroke="#C9A24B" stroke-width="1.5"/>
  <line x1="232" y1="185" x2="268" y2="185" stroke="#C9A24B" stroke-width="1.5"/>
  <text x="180" y="190" text-anchor="middle" fill="#C9A24B" font-family="Georgia, 'Times New Roman', serif" font-size="14" letter-spacing="7">MARRAKECH</text>
</svg>
