<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" role="img" aria-label="Bahia Palace Marrakech">
  <title>Bahia Palace Marrakech</title>
  <g transform="translate(80,80)">
    <!-- outer gold 8-point star (two squares) -->
    <g fill="none" stroke="#C9A24B" stroke-width="4">
      <rect x="-62" y="-62" width="124" height="124"/>
      <rect x="-62" y="-62" width="124" height="124" transform="rotate(45)"/>
    </g>
    <!-- inner green 8-point ring -->
    <g fill="none" stroke="#1F5C3D" stroke-width="4">
      <rect x="-47" y="-47" width="94" height="94"/>
      <rect x="-47" y="-47" width="94" height="94" transform="rotate(45)"/>
    </g>
    <!-- corner gold diamonds -->
    <g fill="#C9A24B">
      <rect x="-7" y="-87" width="14" height="14" transform="rotate(45 0 -80)"/>
      <rect x="-7" y="73" width="14" height="14" transform="rotate(45 0 80)"/>
      <rect x="-87" y="-7" width="14" height="14" transform="rotate(45 -80 0)"/>
      <rect x="73" y="-7" width="14" height="14" transform="rotate(45 80 0)"/>
    </g>
    <!-- cream center disc -->
    <circle cx="0" cy="0" r="40" fill="#FAF6EC"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#C9A24B" stroke-width="2"/>
    <!-- letter B -->
    <text x="0" y="23" text-anchor="middle" fill="#1F5C3D" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold">B</text>
  </g>
</svg>
